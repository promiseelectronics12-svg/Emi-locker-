name: dealer_app
description: EMI Locker Dealer + Reseller Application

environment:
  sdk: ">=3.0.0 <44.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  
  # State Management
  flutter_bloc: ^8.1.0
  equatable: ^2.0.5
  get_it: ^7.6.0
  
  # HTTP & Networking
  dio: ^5.4.0
  flutter_dotenv: ^5.1.0
  http_certificate_pinning: ^3.0.0
  
  # Storage & Security
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.1.6
  
  # Firebase
  firebase_core: ^2.24.0
  firebase_messaging: ^14.7.5
  firebase_database: ^10.4.0
  
  # Tools & Features
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.0
  image_picker: ^1.0.7
  syncfusion_flutter_charts: ^24.1.41
  excel: ^4.0.0
  url_launcher: ^6.2.0
  intl: ^0.18.0
  share_plus: ^7.1.0
  path_provider: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - .env
