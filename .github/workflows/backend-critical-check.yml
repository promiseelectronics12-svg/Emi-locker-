name: Backend Critical Check

on:
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-critical-check.yml'
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend-critical-check.yml'

jobs:
  backend-critical:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npm run lint:critical
      - run: npm run format:critical
